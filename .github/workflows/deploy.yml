name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # קומיט של סוכן התמונות נדחף עם GITHUB_TOKEN, וגיטהאב בכוונה לא מפעיל
  # זרימות מדחיפות כאלה, נגד לולאות אינסופיות. בלי הטריגר הזה המפה
  # מתעדכנת ב main אבל האתר החי לא מקבל אותה לעולם.
  workflow_run:
    workflows: ["Refresh image map"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vite build --base=/YadLayaad/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
